name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      image: ${{ steps.filter.outputs.image }}
      n8n_node: ${{ steps.filter.outputs.n8n_node }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            image:
              - 'apps/web/**'
              - 'packages/db/**'
              - 'packages/domain/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'eslint.config.mjs'
              - 'Dockerfile'
              - 'docker-compose.example.yml'
              - '.dockerignore'
              - '.github/workflows/ci.yml'
            n8n_node:
              - 'packages/n8n-nodes-ajam/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - '.github/workflows/ci.yml'

  verify-image:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/dev.db
      SESSION_SECRET: ci-session-secret-for-static-builds
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prepare build version
        run: echo "BUILD_VERSION=${GITHUB_RUN_NUMBER}-$(TZ=Asia/Seoul date +%y%m%d)" >> "$GITHUB_ENV"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  verify-n8n-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck n8n node
        run: pnpm --filter @junglesub/n8n-nodes-ajam typecheck

      - name: Build n8n node
        run: pnpm --filter @junglesub/n8n-nodes-ajam build

  publish-image:
    runs-on: ubuntu-latest
    needs: [changes, verify-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.image == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        run: |
          echo "IMAGE_NAME=ghcr.io/junglesub/ajam" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=${GITHUB_RUN_NUMBER}-$(TZ=Asia/Seoul date +%y%m%d)" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:v${{ env.BUILD_VERSION }}

  publish-n8n-node:
    runs-on: ubuntu-latest
    needs: [changes, verify-n8n-node]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.n8n_node == 'true'
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: packages/n8n-nodes-ajam
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          registry-url: https://npm.pkg.github.com
          scope: "@junglesub"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build n8n node
        run: pnpm build

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
