name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      image: ${{ steps.filter.outputs.image }}
      n8n_node_version: ${{ steps.n8n_version.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            image:
              - 'apps/web/**'
              - 'packages/db/**'
              - 'packages/domain/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'eslint.config.mjs'
              - 'Dockerfile'
              - 'docker-compose.example.yml'
              - '.dockerignore'
              - '.github/workflows/ci.yml'

      - name: Detect n8n node version change
        id: n8n_version
        shell: bash
        run: |
          package_file="packages/n8n-nodes-ajam/package.json"
          before_sha="${{ github.event.before }}"
          current_version="$(node -p "require('./${package_file}').version")"
          previous_version=""

          if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$before_sha:$package_file" 2>/dev/null; then
            previous_version="$(git show "$before_sha:$package_file" | node -e "let input = ''; process.stdin.setEncoding('utf8'); process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).version || ''));")"
          fi

          echo "previous_version=$previous_version"
          echo "current_version=$current_version"

          if [ "$current_version" != "$previous_version" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  verify-image:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/dev.db
      SESSION_SECRET: ci-session-secret-for-static-builds
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prepare build version
        run: echo "BUILD_VERSION=${GITHUB_RUN_NUMBER}-$(TZ=Asia/Seoul date +%y%m%d)" >> "$GITHUB_ENV"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Seed database
        run: pnpm db:seed

      - name: Build
        run: pnpm build

      - name: Build Docker image
        run: docker build --build-arg BUILD_VERSION=ci -t ajam-ci .

      - name: Smoke test Docker web server
        shell: bash
        run: |
          container_id="$(docker run -d -p 127.0.0.1:3000:3000 ajam-ci)"

          cleanup() {
            docker rm -f "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/api/health >/dev/null; then
              exit 0
            fi

            if ! docker ps --quiet --filter "id=$container_id" | grep --quiet .; then
              docker logs "$container_id"
              exit 1
            fi

            sleep 1
          done

          docker logs "$container_id"
          exit 1

  verify-n8n-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck n8n node
        run: pnpm --filter @junglesub/n8n-nodes-ajam typecheck

      - name: Build n8n node
        run: pnpm --filter @junglesub/n8n-nodes-ajam build

  publish-image:
    runs-on: ubuntu-latest
    needs: [changes, verify-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.image == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        run: |
          echo "IMAGE_NAME=ghcr.io/junglesub/ajam" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=${GITHUB_RUN_NUMBER}-$(TZ=Asia/Seoul date +%y%m%d)" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:v${{ env.BUILD_VERSION }}

  request-dca-deploy:
    runs-on: ubuntu-latest
    needs: [changes, publish-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.image == 'true' && needs.publish-image.result == 'success'
    env:
      DCA_ADDR: ${{ secrets.DCA_ADDR }}
      DCA_SECRET: ${{ secrets.DCA_SECRET }}
    steps:
      - name: Send Deploy Request to DCA
        run: |
          curl --fail --request POST \
            --url "$DCA_ADDR" \
            --header "content-type: application/json" \
            --header "X-API-Key: $DCA_SECRET" \
            --data "{\"gh\": {\"commitSha\": \"$GITHUB_SHA\", \"githubRepo\": \"$GITHUB_REPOSITORY\"}}"

  publish-n8n-node:
    runs-on: ubuntu-latest
    needs: [changes, verify-n8n-node]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.n8n_node_version == 'true'
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: packages/n8n-nodes-ajam
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          registry-url: https://npm.pkg.github.com
          scope: "@junglesub"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build n8n node
        run: pnpm build

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
