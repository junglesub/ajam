<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>aJam</title>
  </head>
  <body>
    <main class="popup">
      <section class="connection">
        <strong id="connectionState">연결 필요</strong>
        <button id="connectButton" type="button">aJam 연결</button>
      </section>

      <nav class="modes" aria-label="입력 모드">
        <button id="timeModeButton" class="active" type="button">시간 입력</button>
        <button id="contentModeButton" type="button">내용 입력</button>
      </nav>

      <label class="field">
        <span>aJam 주소</span>
        <input id="baseUrlInput" type="url" value="http://localhost:3000" />
      </label>

      <label class="field">
        <span>월</span>
        <input id="monthInput" type="month" />
      </label>

      <section>
        <div class="sectionTitle">
          <strong>카테고리 선택 및 순서</strong>
          <button id="refreshButton" type="button">새로고침</button>
        </div>
        <ol id="categoryList" class="categoryList"></ol>
      </section>

      <label class="optionRow">
        <input id="zoomOutBeforeMacroInput" type="checkbox" />
        <span>실행 시 최대 축소 후 복구</span>
      </label>

      <dl class="preview">
        <div>
          <dt>카테고리</dt>
          <dd id="categoryCount">0</dd>
        </div>
        <div>
          <dt>입력</dt>
          <dd id="filledCount">0</dd>
        </div>
        <div>
          <dt>빈칸 이동</dt>
          <dd id="blankCount">0</dd>
        </div>
      </dl>

      <p id="statusMessage" class="status"></p>
      <button id="runButton" class="primary" type="button">시간 입력 실행</button>
      <button id="stopButton" class="secondary" type="button" hidden>중지</button>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
